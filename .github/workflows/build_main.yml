name: Build Main

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 20 1 * *'

jobs:
  build_and_test:
    name: "Build and Test"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6.2.0
      with:
        node-version: 24.x

    - name: Get yarn cache directory path
      id: yarn-cache-dir-path
      run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v5
      id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
      with:
        path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: "Install Dependencies"
      run: yarn --frozen-lockfile

    - name: get date and revision
      id: date_and_rev
      run: |
        echo "revision=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
        echo "created=$(date -u +'%d.%m.%Y %H:%M:%S')" >> $GITHUB_OUTPUT

    - name: set env variables
      run: |
        sed -i 's#VITE_DATE=Not specified#VITE_DATE=${{ steps.date_and_rev.outputs.created }}#g' .env
        sed -i 's#VITE_REVISION=Not specified#VITE_REVISION=${{ steps.date_and_rev.outputs.revision }}#g' .env

    - name: "Build"
      run: yarn run build

    - name: Archive dist
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: |
          dist
          !dist/report.html

    - name: Archive report
      uses: actions/upload-artifact@v7
      with:
        name: webpack report
        path: dist/report.html

    - name: "Unit Tests"
      run: yarn test:unit

    - name: Archive report
      uses: actions/upload-artifact@v7
      with:
        name: unit test coverage report
        path: coverage

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: "E2E Tests"
      run: yarn test:e2e

    - name: Archive E2E test report
      uses: actions/upload-artifact@v7
      with:
        name: e2e test report
        path: tests/e2e/reports

  build_edge:
    name: "Build & Push Edge Docker Image"
    runs-on: ubuntu-latest
    needs: [build_and_test]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download dist artifact
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist

    - name: Set image name
      id: meta
      run: |
        IMAGE="ghcr.io/${{ github.repository }}"
        echo "image=${IMAGE,,}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.0.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.CR_PAT }}

    - name: Copy dist for Docker build
      run: cp -r dist docker/github/dist

    - name: Build and push Docker image (edge)
      uses: docker/build-push-action@v6.19.2
      with:
        context: docker/github
        file: docker/github/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.image }}:edge

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [build_and_test]

    steps:
    - name: "Checkout"
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download coverage reports
      uses: actions/download-artifact@v8
      with:
        name: unit test coverage report
        path: coverage

    - name: fix code coverage paths # see https://community.sonarsource.com/t/code-coverage-doesnt-work-with-github-action/16747/5
      working-directory: ./coverage
      run: |
        sed -i 's/\/home\/runner\/work\/cevi-buchs-rohr-aarau-website\/cevi-buchs-rohr-aarau-website\//\/github\/workspace\//g' lcov.info
        sed -i 's/\/home\/runner\/work\/cevi-buchs-rohr-aarau-website\/cevi-buchs-rohr-aarau-website\//\/github\/workspace\//g' sonar-test-reporter.xml

    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

